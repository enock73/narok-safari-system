<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>404 — Page Not Found | MaraGate</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@600;700&family=Inter:wght@400;500&display=swap" rel="stylesheet">
  <style>
    body { background: linear-gradient(135deg,#0d2118,#2d6a4f); min-height:100vh;
           display:flex;align-items:center;justify-content:center;font-family:'Inter',sans-serif; }
    .err-card { background:#fff;border-radius:20px;padding:48px 40px;text-align:center;
                max-width:440px;width:100%;box-shadow:0 25px 60px rgba(0,0,0,.35); }
    .err-icon { font-size:72px;color:#f4a261;margin-bottom:16px; }
    h1 { font-family:'Space Grotesk',sans-serif;font-size:64px;font-weight:700;
         color:#1a3c2e;margin:0;line-height:1; }
    h2 { font-family:'Space Grotesk',sans-serif;font-size:20px;color:#374151;margin:12px 0 8px; }
    p  { color:#6b7280;font-size:14px;margin-bottom:28px; }
    .btn-back { background:#2d6a4f;color:#fff;border:none;padding:10px 28px;border-radius:8px;
                font-weight:500;text-decoration:none;display:inline-block;transition:background .2s; }
    .btn-back:hover { background:#1a3c2e;color:#fff; }
  </style>
</head>
<body>
  <div class="err-card">
    <div class="err-icon"><i class="bi bi-tree-fill"></i></div>
    <h1>404</h1>
    <h2>Lost in the Savanna?</h2>
    <p>The page you're looking for has wandered off — perhaps with the wildebeest migration.</p>
    <a href="/" class="btn-back"><i class="bi bi-house-fill me-2"></i>Back to Home</a>
  </div>
</body>
</html>
